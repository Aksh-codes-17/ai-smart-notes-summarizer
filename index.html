<!DOCTYPE html>

<html>

<head>
<title>AI Smart Notes Summarizer</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

</head>

<body>

<div class="container">

<h1>AI Smart Notes Summarizer</h1>

<p class="description">
Upload a PDF or paste text to generate a point-by-point summary.
</p>

<textarea id="notes" placeholder="Paste article or notes here..."></textarea>

<br>

<input type="file" id="pdfFile" accept="application/pdf">

<br>

<button onclick="loadPDF()">Load PDF</button> <button onclick="summarizeText()">Summarize</button>

<h2>Summary</h2>

<ul id="result"></ul>

</div>

<script src="script.js"></script>

</body>

</html>
