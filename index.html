<!DOCTYPE html>
<html>
<head>
    <title>AI Smart Notes Summarizer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background: #111827; color: white; text-align: center; padding: 40px; }
        textarea { width: 80%; height: 150px; padding: 10px; border-radius: 8px; border: none; }
        button { padding: 12px 24px; margin-top: 10px; background: #22c55e; border: none; color: white; cursor: pointer; font-weight: bold; border-radius: 5px; }
        button:hover { background: #16a34a; }
        ul { text-align: left; width: 60%; margin: 20px auto; line-height: 1.6; }
        li { margin-bottom: 10px; background: #1f2937; padding: 10px; border-radius: 5px; list-style-type: none; border-left: 4px solid #22c55e; }
        h2 { margin-top: 30px; color: #22c55e; }
    </style>
</head>
<body>

    <h1>AI Smart Notes Summarizer</h1>
    <p>Upload a PDF or paste text below</p>

    <input type="file" id="pdfUpload" accept="application/pdf">
    <br><br>
    <textarea id="textInput" placeholder="Text will appear here after upload or you can paste it..."></textarea>
    <br>
    <button onclick="generateSummary()">Generate Summary</button>

    <h2>Summary Notes</h2>
    <ul id="output"></ul>

    <script>
        // Set worker path for PDF.js (Required for it to function)
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

        // PDF READER
        document.getElementById("pdfUpload").addEventListener("change", async function(e) {
            let file = e.target.files[0];
            if (!file) return;

            let reader = new FileReader();
            reader.onload = async function() {
                let typedarray = new Uint8Array(this.result);
                
                try {
                    const pdf = await pdfjsLib.getDocument({data: typedarray}).promise;
                    let fullText = "";

                    // Properly loop through pages and wait for each
                    for (let i = 1; i <= pdf.numPages; i++) {
                        const page = await pdf.getPage(i);
                        const content = await page.getTextContent();
                        const strings = content.items.map(item => item.str);
                        fullText += strings.join(" ") + " ";
                    }

                    document.getElementById("textInput").value = fullText.trim();
                } catch (err) {
                    console.error("Error reading PDF:", err);
                    alert("Failed to read PDF. Make sure it's a valid file.");
                }
            };
            reader.readAsArrayBuffer(file);
        });

        // SUMMARY FUNCTION
        function generateSummary() {
            let text = document.getElementById("textInput").value;
            let output = document.getElementById("output");
            output.innerHTML = "";

            if (text.trim() === "") {
                alert("Please enter text or upload a PDF first.");
                return;
            }

            // Split by punctuation and filter out empty/very short strings
            let sentences = text.split(/[.!?]/).map(s => s.trim()).filter(s => s.length > 15);

            if (sentences.length === 0) {
                alert("No readable sentences found.");
                return;
            }

            // Take the first 5 meaningful sentences
            let summaryItems = sentences.slice(0, 5);

            summaryItems.forEach(function(sentence) {
                let li = document.createElement("li");
                // Removed the "slice(0,7)" logic so you actually see the full summary sentence
                li.innerText = sentence + ".";
                output.appendChild(li);
            });
        }
    </script>
</body>
</html>
