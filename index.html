<!DOCTYPE html>

<html>

<head>
<title>AI Smart Notes Generator</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

</head>

<body>

<div class="container">

<h1>AI Smart Notes Generator</h1>

<p class="description">
Paste an article or upload a PDF to convert it into structured notes.
</p>

<textarea id="notes" placeholder="Paste article or paragraph here..."></textarea>

<br>

<input type="file" id="pdfFile" accept="application/pdf">

<br>

<button onclick="loadPDF()">Load PDF</button> <button onclick="generateNotes()">Generate Notes</button>

<h2>Generated Notes</h2>

<div id="result"></div>

</div>

<script src="script.js"></script>

</body>

</html>
