<!DOCTYPE html>
<html>

<head>

<title>AI Smart Notes Summarizer</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.14.305/pdf.min.js"></script>

</head>

<body>

<div class="container">

<h1>AI Smart Notes Summarizer</h1>

<p>Upload a PDF or paste text to generate notes.</p>

<input type="file" id="pdfFile" accept="application/pdf">

<br><br>

<textarea id="textInput" placeholder="Or paste paragraph here..."></textarea>

<br>

<button onclick="generateSummary()">Generate Summary</button>

<h2>Summary Notes</h2>

<ul id="output"></ul>

</div>

<script src="script.js"></script>

</body>
</html>
